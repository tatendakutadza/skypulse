name: Frontend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install and test
        run: |
          if [ -f "frontend/package.json" ]; then
            cd frontend
            npm install
            npm run test || true
          else
            echo "Frontend not ready yet — skipping"
          fi
